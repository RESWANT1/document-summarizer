<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Summary Result</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=IBM+Plex+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <a href="/"><span class="logo-mark">∑</span><span class="logo-text">DocSummarizer</span></a>
    </div>
  </header>
  <main>
    <section class="card result-card">
      <h2>Your Summary</h2>
      <div class="summary-text">{{ summary }}</div>
      <a href="/" class="btn-outline" style="display:inline-block;margin-top:1.5rem;">← Summarize another</a>
    </section>
  </main>
</body>
</html>
